name: Publish Release Artifacts

on:
  release:
    types: [published]

# Trusted Publishers via OIDC: no token in GitHub secrets.
# PyPI side must be configured first (see _claude/MEMORY.md
# 2026-06-05 entry for the one-time setup steps).

jobs:
  publish-pypi:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/bragi-theme-zelda/
    permissions:
      id-token: write  # required for OIDC
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Build sdist + wheel
        run: uv build

      - name: Verify build artefacts
        run: |
          ls -lh dist/
          test -f dist/*.tar.gz
          test -f dist/*.whl

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # No `password` field — OIDC handles auth.
          # No `repository-url` — defaults to https://upload.pypi.org/legacy/.
          # No `packages-dir` — defaults to dist/.
          skip-existing: true  # idempotent if a re-run hits the same version
          verbose: true

  publish-docker:
    needs: publish-pypi
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: [admin, delivery]
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      # The propagation gate below uses `python3 -m pip download` to
      # probe resolvability. pip honours the `Requires-Python`
      # constraint on the simple index: ubuntu-latest currently ships
      # Python 3.12.3 by default, and bragi-theme-zelda's
      # `requires-python` is `>=3.14,<4`. Without an explicit Python,
      # pip silently refuses to resolve the just-published wheel and
      # the error reads identical to a propagation lag (the bragi
      # v1.31.0 incident burned hours on this before the diagnostic
      # workflow surfaced it). Pin a Python that satisfies the floor;
      # bump in lockstep if bragi-theme-zelda's floor moves.
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Resolve version from release tag
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      # PyPI's JSON metadata endpoint serves 200 well before `pip
      # install` can resolve the wheel from every CDN node; the old
      # curl-against-JSON probe surfaced "reachable" while the
      # downstream Dockerfile `pip install` still failed (v0.4.11
      # post-mortem; portfolio MEMORY 2026-06-06). Probe with pip
      # itself so the gate exercises the same resolver path the
      # docker build is about to take. 1800s (180 x 10s) matches
      # bragi's release.yml budget after the v1.31.0 incident.
      - name: Wait for PyPI propagation
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          for i in $(seq 1 180); do
            rm -rf /tmp/pypi-check
            mkdir -p /tmp/pypi-check
            if python3 -m pip download \
                --no-deps \
                --quiet \
                --dest /tmp/pypi-check \
                "bragi-theme-zelda==${VERSION}" 2>/dev/null; then
              echo "bragi-theme-zelda==${VERSION} resolvable on PyPI (attempt ${i})"
              rm -rf /tmp/pypi-check
              exit 0
            fi
            echo "attempt ${i}: bragi-theme-zelda==${VERSION} not yet resolvable on PyPI"
            sleep 10
          done
          echo "PyPI did not surface bragi-theme-zelda==${VERSION} after 1800s; check publish-pypi step output and re-run this job"
          exit 1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          # bragi-admin-zelda / bragi-delivery-zelda — preserves bragi-<role>
          # prefix so the variants sort adjacent to the base in GHCR listings.
          images: ghcr.io/${{ github.repository_owner }}/bragi-${{ matrix.image }}-zelda
          flavor: |
            latest=auto
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/${{ matrix.image }}.Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            THEME_VERSION=${{ steps.version.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
