name: Publish to PyPI

on:
  release:
    types: [published]

# Trusted Publishers via OIDC: no token in GitHub secrets.
# PyPI side must be configured first (see _claude/MEMORY.md
# 2026-06-05 entry for the one-time setup steps).

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/bragi-theme-zelda/
    permissions:
      id-token: write  # required for OIDC
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install Poetry
        run: pipx install poetry

      - name: Build sdist + wheel
        run: poetry build

      - name: Verify build artefacts
        run: |
          ls -lh dist/
          test -f dist/*.tar.gz
          test -f dist/*.whl

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # No `password` field — OIDC handles auth.
          # No `repository-url` — defaults to https://upload.pypi.org/legacy/.
          # No `packages-dir` — defaults to dist/.
          skip-existing: true  # idempotent if a re-run hits the same version
          verbose: true
