name: CI

on:
  push:
    branches: [develop, main, "release/**", "hotfix/**"]
  pull_request:
    branches: [develop, main]

# Minimum permissions: CI runs untrusted PR code, so the workflow
# token must not carry write permissions by default.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          # 3.14 matches pyproject.toml's `>=3.14,<4` constraint and the
          # local runtime. GHA ships stable 3.14 pre-built images.
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check src/ tests/

      - name: Format check
        run: uv run ruff format --check src/ tests/

      - name: Type check
        run: uv run mypy src/

      - name: Unit + contrib tests
        run: uv run pytest tests/unit/ tests/contrib/ -v

      - name: Integration tests
        run: uv run pytest tests/integration/ -v
